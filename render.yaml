services:
  - type: web
    name: khai-tri-edu
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: FILESYSTEM_DISK
        value: public
      - key: RENDER_FALLBACK_SQLITE
        value: false
      - key: RENDER_SQLITE_PATH
        value: /tmp/render.sqlite
      - key: RENDER_IMPORT_SQL_DUMP
        value: false
      - key: RENDER_SQL_DUMP_PATH
        value: /var/www/html/khaitriedu.sql
      - key: RENDER_SCHEMA_DUMP_PATH
        value: /var/www/html/database/schema/mysql-schema.sql
      - key: RENDER_RESET_DATABASE
        sync: false
      - key: RENDER_SEED_DEMO
        value: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GEMINI_ASSISTANT_MODEL
        value: gemini-2.5-flash-lite
      - key: MAIL_MAILER
        sync: false
      - key: MAIL_SCHEME
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      - key: VNPAY_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_EXPIRE_MINUTES
        value: 15
      - key: VNPAY_LOCALE
        value: vn
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_IPN_URL
        sync: false
      - key: FIREFLY_URL
        sync: false
      - key: FIREFLY_API_KEY
        sync: false
      - key: FIREFLY_NAMESPACE
        sync: false
      - key: FIREFLY_TOKEN_POOL
        sync: false
      - key: FIREFLY_TOKEN_NAME
        value: KhaiTriCredit
      - key: FIREFLY_PLATFORM_IDENTITY
        value: platform
      - key: FIREFLY_SIGNER
        sync: false
      - key: FIREFLY_AUDIT_TOPIC
        value: audit