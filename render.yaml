services:
  - type: web
    name: khai-tri-edu
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://khai-tri-edu.onrender.com
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_URI
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MONGODB_AUTH_SOURCE
        sync: false
      - key: MONGODB_REPLICA_SET
        sync: false
      - key: MONGODB_TLS
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: 120
      - key: SESSION_EXPIRE_ON_CLOSE
        value: true
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: FILESYSTEM_DISK
        value: public
      - key: RENDER_RESET_DATABASE
        sync: false
      - key: RENDER_SEED_DEMO
        value: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://khai-tri-edu.onrender.com/auth/google/callback
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        value: https://khai-tri-edu.onrender.com/auth/facebook/callback
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GEMINI_ASSISTANT_MODEL
        value: gemini-2.5-flash-lite
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_SCHEME
        value: tls
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Khai Tri Edu
      - key: VNPAY_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_ALLOW_SANDBOX_IN_PRODUCTION
        value: true
      - key: VNPAY_EXPIRE_MINUTES
        value: 15
      - key: VNPAY_LOCALE
        value: vn
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        value: https://khai-tri-edu.onrender.com/payments/vnpay/return
      - key: VNPAY_IPN_URL
        value: https://khai-tri-edu.onrender.com/payments/vnpay/ipn
      - key: FIREFLY_URL
        sync: false
      - key: FIREFLY_AUTH_MODE
        value: bearer
      - key: FIREFLY_API_KEY
        sync: false
      - key: FIREFLY_USERNAME
        sync: false
      - key: FIREFLY_PASSWORD
        sync: false
      - key: FIREFLY_NAMESPACE
        sync: false
      - key: FIREFLY_MEMBER_LABEL
        value: Khai Tri Edu
      - key: FIREFLY_MEMBER_ROLE
        value: issuer
      - key: FIREFLY_CONSORTIUM_QUORUM
        value: 2
      - key: FIREFLY_CONSORTIUM_MEMBERS
        sync: false
      - key: FIREFLY_TOKEN_POOL
        sync: false
      - key: FIREFLY_TOKEN_NAME
        value: KhaiTriCredit
      - key: FIREFLY_PLATFORM_IDENTITY
        value: platform
      - key: FIREFLY_SIGNER
        sync: false
      - key: FIREFLY_AUDIT_TOPIC
        value: audit
